<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy New Year</title>

  <!-- Meta for clean previews -->
  <meta name="description" content="Happy New Year — elegant animated text." />
  <meta property="og:title" content="Happy New Year 2026" />
  <meta property="og:description" content="Celebrate with a stylish animated wish." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#111111" />

  <style>
    /* Base reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* Fireworks background using pseudo-elements */
    body::before, body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 2%, transparent 70%) repeat;
      background-size: 200px 200px;
      animation: fireworks 6s linear infinite;
      z-index: 0;
    }
    body::after {
      animation-delay: 3s;
    }
    @keyframes fireworks {
      0% { background-position: 0 0; opacity: 0.6; }
      50% { background-position: 100px 200px; opacity: 1; }
      100% { background-position: 0 0; opacity: 0.6; }
    }

    /* Center container */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    /* Main headline */
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, #ff375f, #ffd83d, #3dd7ff, #ad6eff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textGlow 6s ease-in-out infinite;
    }
    @keyframes textGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Subtext */
    p {
      font-size: 1.2rem;
      margin-top: 12px;
      color: rgba(255,255,255,0.85);
    }

    /* Gradient style for LAHIN */
    .author {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 20px;
      background: linear-gradient(90deg, #ff375f, #ffd83d, #3dd7ff, #ad6eff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textGlow 6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Happy New Year 2026</h1>
    <p>Wishing you success, joy, and new beginnings.</p>
    <p class="author">By LAHIN</p>
  </div>
</body>
</html>
